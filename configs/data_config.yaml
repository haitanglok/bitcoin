# configs/data_config.yaml

paths:
  raw_dir:        "data/raw"
  processed_dir:  "data/processed"
  embeddings_dir: "data/embeddings"

  elliptic_features:  "elliptic_txs_features.csv"
  elliptic_classes:   "elliptic_txs_classes.csv"
  elliptic_edgelist:  "elliptic_txs_edgelist.csv"

  processed_nodes:  "nodes_clean.csv"
  processed_edges:  "edges_clean.csv"
  features_scaled:  "features_scaled.csv"
  classes_clean:    "classes_clean.csv"
  edges_clean:      "edges_clean.csv"

preprocessing:
  missing_value_strategy: "median"
  outlier_method:         "none"
  outlier_threshold:      3.0
  filter_unknown:         false

  label_mapping:
    "1":       1
    "2":       0
    "unknown": -1

feature_engineering:
  use_aggregate_features: true
  num_local_features:     94
  feature_selection:      false
  variance_threshold:     0.01
  scaler:                 "standard"
